<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity River Run</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        #game-container {
            position: relative;
        }

        canvas {
            background-color: #0000a0;
            /* River blue */
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
            image-rendering: pixelated;
        }

        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
        }

        #fuel-gauge-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 38px;
            background-color: #0d3b8e;
            /* River blue */
            border-top: 5px solid black;
            border-bottom: 5px solid black;
            z-index: 10;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            color: black;
        }

        .fuel-tick {
            position: absolute;
            top: 0;
            width: 6px;
            height: 12px;
            background-color: black;
            transform: translateX(-50%);
        }

        .fuel-label {
            position: absolute;
            bottom: 0px;
            transform: translateX(-50%);
            font-size: 24px;
            line-height: 1;
        }

        #fuel-needle {
            position: absolute;
            top: 6px;
            width: 14px;
            height: 22px;
            background-color: #ffffcc;
            transform: translateX(-50%);
            transition: left 0.1s linear;
        }

        .score-text {
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 0 #000;
        }

        .overlay-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        #game-over {
            display: none;
        }

        #start-screen {
            display: flex;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 18px;
            font-family: inherit;
            background-color: #ffaa00;
            border: none;
            cursor: pointer;
            color: black;
            font-weight: bold;
        }

        button:hover {
            background-color: #ffcc00;
        }
    </style>
</head>

<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="600" height="800"></canvas>
        <div id="hud">
            <div class="score-text">SCORE: <span id="score-display">0</span></div>
            <div class="score-text">LEVEL: <span id="level-display">1</span></div>
        </div>
        <div id="fuel-gauge-container">
            <div class="fuel-tick" style="left: 10%;"></div>
            <div class="fuel-tick" style="left: 50%;"></div>
            <div class="fuel-tick" style="left: 90%;"></div>
            <div class="fuel-label" style="left: 10%;">E</div>
            <div class="fuel-label" style="left: 50%;">1/2</div>
            <div class="fuel-label" style="left: 90%;">F</div>
            <div id="fuel-needle" style="left: 90%;"></div>
        </div>
        <div id="game-over" class="overlay-screen">
            <h1 style="color: #ff3333; font-size: 48px; text-shadow: 2px 2px #000;">GAME OVER</h1>
            <h2>Score: <span id="final-score">0</span></h2>
            <button onclick="startGame()">RESTART MISSION</button>
            <button onclick="showStartScreen()">MAIN MENU</button>
        </div>
        <div id="start-screen" class="overlay-screen">
            <h1 style="color: #00ff00; font-size: 44px; text-shadow: 2px 2px #000; text-align: center;">River Ride -
                Deluxe Version</h1>
            <p style="text-align: center; font-size: 18px; text-shadow: 1px 1px #000; margin-bottom: 20px;">Use Arrows
                to Move/Speed<br><br>Space to Shoot</p>
            <button onclick="startGame()">START GAME</button>
        </div>
    </div>
    <script src="game.js?v=10"></script>
</body>

</html>
