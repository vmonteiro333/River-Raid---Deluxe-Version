<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity River Run</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }
        #game-container {
            position: relative;
        }
        canvas {
            background-color: #0000a0; /* River blue */
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
            image-rendering: pixelated;
        }
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
        }
        #fuel-bar-container {
            width: 200px;
            height: 20px;
            background-color: #333;
            border: 2px solid white;
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }
        #fuel-bar {
            width: 100%;
            height: 100%;
            background-color: #00ff00;
            transition: width 0.1s linear, background-color 0.2s;
        }
        .score-text {
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 0 #000;
        }
        #game-over {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 18px;
            font-family: inherit;
            background-color: #ffaa00;
            border: none;
            cursor: pointer;
            color: black;
            font-weight: bold;
        }
        button:hover { background-color: #ffcc00; }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="600" height="800"></canvas>
        <div id="hud">
            <div class="score-text">SCORE: <span id="score-display">0</span></div>
            <div class="score-text">LEVEL: <span id="level-display">1</span></div>
        </div>
        <div id="fuel-bar-container">
            <div id="fuel-bar"></div>
        </div>
        <div id="game-over">
            <h1 style="color: #ff3333; font-size: 48px;">GAME OVER</h1>
            <h2>Score: <span id="final-score">0</span></h2>
            <button onclick="startGame()">RESTART MISSION</button>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
